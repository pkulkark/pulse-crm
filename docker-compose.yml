services:
  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    environment:
      VITE_GATEWAY_URL: http://localhost:${GATEWAY_PORT:-4000}
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: infra/docker/gateway.Dockerfile
    depends_on:
      identity-service:
        condition: service_healthy
      crm-relationships-service:
        condition: service_healthy
      deals-service:
        condition: service_healthy
    environment:
      AUTH_TOKEN_SECRET: identity-service-dev-secret
      CRM_RELATIONSHIPS_GRAPHQL_URL: http://crm-relationships-service:8000/graphql/
      DEALS_GRAPHQL_ENABLED: 'true'
      DEALS_GRAPHQL_URL: http://deals-service:8000/graphql/
      GATEWAY_NAME: samplecrm-gateway
      IDENTITY_GRAPHQL_ENABLED: 'true'
      IDENTITY_GRAPHQL_URL: http://identity-service:8000/graphql/
      PORT: 4000
    ports:
      - '${GATEWAY_PORT:-4000}:4000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-service:
    build:
      context: .
      dockerfile: infra/docker/django-service.Dockerfile
      args:
        SERVICE_DIR: apps/identity_service
    environment:
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,identity-service
      DJANGO_DEBUG: 'true'
      DJANGO_SECRET_KEY: identity-service-dev-secret
      DB_HOST: identity-db
      DB_NAME: ${POSTGRES_DB_IDENTITY:-identity_service}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-crm}
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-crm}
      PORT: 8000
    ports:
      - '${IDENTITY_SERVICE_PORT:-8101}:8000'
    depends_on:
      identity-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  crm-relationships-service:
    build:
      context: .
      dockerfile: infra/docker/django-service.Dockerfile
      args:
        SERVICE_DIR: apps/crm_relationships_service
    environment:
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,crm-relationships-service
      DJANGO_DEBUG: 'true'
      DJANGO_SECRET_KEY: crm-relationships-service-dev-secret
      DB_HOST: crm-db
      DB_NAME: ${POSTGRES_DB_CRM:-crm_relationships_service}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-crm}
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-crm}
      DEAL_STATUS_CHANGED_TOPIC: deal.status_changed
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_ENABLED: 'true'
      KAFKA_CONSUMER_GROUP: crm-relationships-service
      PORT: 8000
    ports:
      - '${CRM_RELATIONSHIPS_SERVICE_PORT:-8002}:8000'
    depends_on:
      crm-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  deals-service:
    build:
      context: .
      dockerfile: infra/docker/django-service.Dockerfile
      args:
        SERVICE_DIR: apps/deals_service
    environment:
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,deals-service
      DJANGO_DEBUG: 'true'
      DJANGO_SECRET_KEY: deals-service-dev-secret
      DB_HOST: deals-db
      DB_NAME: ${POSTGRES_DB_DEALS:-deals_service}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-crm}
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-crm}
      CRM_RELATIONSHIPS_GRAPHQL_URL: http://crm-relationships-service:8000/graphql/
      DEAL_STATUS_CHANGED_TOPIC: deal.status_changed
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PORT: 8000
    ports:
      - '${DEALS_SERVICE_PORT:-8003}:8000'
    depends_on:
      deals-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB_IDENTITY:-identity_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
    ports:
      - '${IDENTITY_DB_PORT:-5433}:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB_IDENTITY:-identity_service}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  crm-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB_CRM:-crm_relationships_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
    ports:
      - '${CRM_DB_PORT:-5434}:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB_CRM:-crm_relationships_service}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  deals-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB_DEALS:-deals_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
    ports:
      - '${DEALS_DB_PORT:-5435}:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB_DEALS:-deals_service}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.2
    hostname: kafka
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_NODE_ID: 1
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - '${KAFKA_PORT:-9092}:9092'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1',
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: apache/kafka:3.7.2
    depends_on:
      kafka:
        condition: service_healthy
    command:
      [
        '/bin/sh',
        '-c',
        '/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic deal.status_changed --partitions 1 --replication-factor 1',
      ]
